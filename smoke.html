<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cartógrafo — smoke test</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo" title="Cartógrafo">
      <svg class="logo-mark" viewBox="0 0 64 64" width="24" height="24" aria-label="Cartógrafo" role="img">
        <defs>
          <linearGradient id="logoG" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f15b6a"></stop>
            <stop offset="1" stop-color="#d2353e"></stop>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" fill="url(#logoG)"></rect>
        <g stroke="#fff" stroke-width="4.5" stroke-linecap="round">
          <line x1="32" y1="32" x2="32" y2="18"></line>
          <line x1="32" y1="32" x2="46" y2="32"></line>
          <line x1="32" y1="32" x2="32" y2="46"></line>
          <line x1="32" y1="32" x2="18" y2="32"></line>
        </g>
        <circle cx="46" cy="32" r="4" fill="#fff"></circle>
        <circle cx="32" cy="46" r="4" fill="#fff"></circle>
        <circle cx="18" cy="32" r="4" fill="#fff"></circle>
        <circle cx="32" cy="15" r="6" fill="#fff"></circle>
        <circle cx="32" cy="32" r="4.5" fill="#d2353e" stroke="#fff" stroke-width="3.5"></circle>
      </svg>
      <span class="logo-text">Cartógrafo</span>
    </span>
    <select id="docSelect" title="Diagramas guardados"></select>
    <input id="docName" type="text" spellcheck="false" title="Nombre del diagrama">
    <button id="docNew" class="icon-btn" title="Nuevo diagrama">＋</button>
    <button id="docDelete" class="icon-btn" title="Eliminar diagrama">🗑</button>
  </div>
  <div class="topbar-right">
    <button id="addNode" class="btn primary">＋ Nodo</button>
    <button id="addTimeline" class="btn" title="Agregar una línea de tiempo al canvas">＋ Timeline</button>
    <button id="autoLayout" class="btn" title="Auto-acomodar el diagrama por capas">Ordenar</button>
    <button id="exportSvg" class="btn">SVG</button>
    <button id="exportPng" class="btn">PNG</button>
    <button id="exportJson" class="btn">JSON</button>
    <button id="importJson" class="btn">Importar</button>
    <input id="importFile" type="file" accept="application/json,.json" hidden>
    <button id="shareBtn" class="btn">Compartir</button>
    <button id="themeToggle" class="icon-btn" title="Tema claro/oscuro">🌙</button>
  </div>
</header>

<div id="canvasWrap">
  <svg id="canvas">
    <defs>
      <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="1.2" cy="1.2" r="1.2" fill="#d6d6d0"></circle>
      </pattern>
      <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5"
              markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#9b9b94"></path>
      </marker>
      <marker id="arrowSel" viewBox="0 0 10 10" refX="8.5" refY="5"
              markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#3d8bfd"></path>
      </marker>
    </defs>
    <rect id="dotsBg" width="100%" height="100%" fill="url(#dots)"></rect>
    <g id="world">
      <g id="edgesG"></g>
      <g id="nodesG"></g>
      <g id="labelsG"></g>
      <g id="hoverG"></g>
      <g id="guidesG"></g>
      <g id="draftG"></g>
    </g>
  </svg>
</div>

<aside id="panel" hidden>
  <div id="panelNode" hidden>
    <label class="field"><span>Título</span><input id="pTitle" type="text" spellcheck="false"></label>
    <label class="field"><span>Subtítulo</span><input id="pSub" type="text" spellcheck="false"></label>
    <label class="field"><span>Nota</span><textarea id="pNote" rows="3" spellcheck="false" placeholder="Nota flotante junto a la tarjeta…"></textarea></label>
    <div class="field"><span>Color</span><div id="pColors" class="swatches"></div></div>
    <div class="field" id="pSideField" hidden><span>Lado</span><div id="pSide" class="seg"></div></div>
    <div class="field">
      <span>Tabla</span>
      <div id="pRows"></div>
      <button id="pAddRow" class="btn tiny">＋ fila</button>
    </div>
    <div class="panel-actions">
      <button id="pDuplicate" class="btn tiny">Duplicar</button>
      <button id="pDeleteNode" class="btn tiny danger">Eliminar</button>
    </div>
  </div>
  <div id="panelMulti" hidden>
    <div class="field"><span id="pMultiCount">nodos seleccionados</span><div id="pColorsMulti" class="swatches"></div></div>
    <div class="field" id="pSideFieldMulti" hidden><span>Lado</span><div id="pSideMulti" class="seg"></div></div>
    <div class="field" id="pAlignField"><span>Alinear</span><div id="pAlign" class="edge-controls"></div></div>
    <div class="field" id="pDistField"><span>Distribuir</span><div id="pDistribute" class="seg"></div></div>
    <div class="panel-actions">
      <button id="pDeleteMulti" class="btn tiny danger">Eliminar selección</button>
    </div>
  </div>
  <div id="panelEdge" hidden>
    <label class="field"><span>Etiqueta de la flecha</span><input id="pLabel" type="text" spellcheck="false"></label>
    <div class="field"><span>Estilo</span><div id="pEdgeControls"></div></div>
    <div class="panel-actions">
      <button id="pDeleteEdge" class="btn tiny danger">Eliminar flecha</button>
    </div>
  </div>
</aside>

<div id="edgePopup" hidden>
  <div class="field"><span>Tipo de flecha</span><div id="popupEdgeControls"></div></div>
  <button id="popupDone" class="btn tiny">Listo</button>
</div>

<div id="zoombar">
  <button id="zoomOut" class="icon-btn" title="Alejar">−</button>
  <button id="zoomReset" title="Restablecer zoom">100%</button>
  <button id="zoomIn" class="icon-btn" title="Acercar">＋</button>
  <button id="zoomFit" class="icon-btn" title="Ajustar al contenido">⤢</button>
</div>

<div id="hint">doble clic: nuevo nodo / editar texto · doble clic en un eje: nuevo hito · puerto azul: conectar · ⇧+arrastre: selección múltiple · ⌫ borrar · ⌘Z deshacer · ⌘+rueda: zoom</div>

<script src="app.js"></script><script src="smoke-test.js"></script>
</body>
</html>
