server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API: reverse-proxy to the Go backend so the SPA and its API share a single
    # origin (no CORS, relative /api/... fetches just work). The /api/ prefix is
    # preserved — the backend mounts everything under /api/v1.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
